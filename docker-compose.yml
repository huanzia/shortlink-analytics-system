services:
  mysql:
    image: mysql:8.0
    container_name: shortlink-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shortlink_db
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3308:3306"
    volumes:
      - shortlink_mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - shortlink_redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shortlink-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
      TZ: Asia/Shanghai
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - shortlink_rabbitmq_data:/var/lib/rabbitmq

volumes:
  shortlink_mysql_data:
  shortlink_redis_data:
  shortlink_rabbitmq_data:
